name: Deploy to 2 servers

on:
  push:
    branches: [main]

jobs:
  deploy-java:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Java server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ZENKO1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
           if [ ! -d "/var/www/java-app/.git" ]; then
            rm -rf /var/www/java-app
            git clone https://github.com/Mcalinn/Mcalinn.git /var/www/java-app
            fi

            cd /var/www/java-app
              git pull

      - name: Debug
        run: echo "${{ secrets.ZENKO1_HOST }}"  
  deploy-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy Python server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ZENKO2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
           if [ ! -d "/var/www/python-app/.git" ]; then
            rm -rf /var/www/python-app
            git clone https://github.com/Mcalinn/Mcalinn.git /var/www/python-app
            fi

            cd /var/www/python-app
              git pull
