name: Deploy to 2 servers

on:
  push:
    branches: [main]

jobs:
  deploy-java:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Java server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ZENKO1_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "/var/www/java-app" ]; then
              git clone https://github.com/Mcalinn/Mcalinn.git /var/www/java-app
            fi

            cd /var/www/java-app
            git pull

            docker compose up -d --build